<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

        <dialog id="dialog">
            <p id="chanceRange">Hard Level</p>
            <p id="switchLang" data-lang ="en">Change Language</p>
            <p id="aboutus">About Us</p>
        </dialog>
    </nav>
    <section>
        <div>
            <header>
                <h2 data-key="title">Number Guessing Game</h2>
                <h4 data-key="header">Time to Guess a Number between:</h4><h4 id="limits" style="margin: 0;">1 - 20</h4>
            </header>
            <form id="submit" novalidate >
                <input id="guess" type="number" placeholder="???" required>
                <button id="button" type="submit" form="submit" data-key="guess">Guess</button>
                <button id ="reset" data-key="reload">Reload</button>
            </form>
            <ul>
                <li id="firstlist" >Previous Guess: N/A</li>
                <li id="secondlist">Guesses Left: 5</li>
            </ul>
            <p id="result"><span data-key="result"> Try your Luck 😁</span></p>
        </div>
    </section>
    <audio  id="youWin" src="you-win.mp3"></audio>
    <audio id="youLose" src="you-lose.mp3"></audio>

</body>
</html>
